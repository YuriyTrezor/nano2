# Stable Supabase reverse proxy for restricted regions.
# Replace SUPABASE_HOST below with your project host (e.g.
# jvibhsjnspvucjwvhfht.supabase.co).

map $http_origin $cors_origin {
    default "*";
}

server {
    listen 80;
    server_name ru-api.neowork.nl;
    # certbot will turn this into 443/SSL automatically.

    # Pass-through everything to Supabase, preserving auth headers.
    location / {
        # Handle CORS preflight locally so browsers never even hit Supabase.
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "$cors_origin" always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "authorization, x-client-info, apikey, content-type, x-supabase-api-version, prefer, range, x-supabase-client-platform, x-supabase-client-platform-version, x-supabase-client-runtime, x-supabase-client-runtime-version" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }

        proxy_pass https://jvibhsjnspvucjwvhfht.supabase.co;
        proxy_ssl_server_name on;
        proxy_set_header Host jvibhsjnspvucjwvhfht.supabase.co;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Keep Supabase auth headers intact (default behaviour, but explicit).
        proxy_pass_request_headers on;

        # WebSocket / Realtime support.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Add CORS to actual responses too.
        add_header Access-Control-Allow-Origin "$cors_origin" always;
        add_header Access-Control-Expose-Headers "content-range, x-supabase-api-version" always;
    }

    # Cheap health check for monitoring.
    location = /__proxy_health {
        access_log off;
        return 200 "ok\n";
    }
}